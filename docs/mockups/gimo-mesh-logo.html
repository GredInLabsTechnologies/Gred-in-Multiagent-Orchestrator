<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GIMO Mesh — Logo</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#080c14;display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;font-family:'JetBrains Mono',monospace;color:#e8ecf4}

.showcase{display:flex;flex-direction:column;align-items:center;gap:60px;padding:40px}

.logo-large{display:flex;flex-direction:column;align-items:center;gap:24px}
.logo-large svg{width:200px;height:200px;filter:drop-shadow(0 0 30px rgba(59,130,246,0.15))}

/* ═══ GIMO Wordmark ═══ */
.wm{font-family:'Outfit',sans-serif;font-weight:700;letter-spacing:.08em;color:#e8ecf4;line-height:1}

.wm-xl{font-size:48px}
.wm-lg{font-size:32px}
.wm-md{font-size:22px}
.wm-sm{font-size:16px}
.wm-xs{font-size:13px}

.logo-sub{font:500 12px/1 'JetBrains Mono',monospace;letter-spacing:.35em;text-transform:uppercase;color:#5a6a7c;margin-top:-8px}
.logo-sub-sm{font:500 8px/1 'JetBrains Mono',monospace;letter-spacing:.3em;text-transform:uppercase;color:#5a6a7c;margin-top:-4px}

.divider{width:240px;height:1px;background:linear-gradient(90deg,transparent,#1e2a3e,transparent)}

.variants{display:flex;gap:50px;align-items:flex-end;flex-wrap:wrap;justify-content:center}
.variant{display:flex;flex-direction:column;align-items:center;gap:10px}
.variant-label{font-size:9px;letter-spacing:.12em;text-transform:uppercase;color:#5a6a7c}

.variant svg{filter:drop-shadow(0 0 12px rgba(59,130,246,0.1))}

.inline-logo{display:flex;align-items:center;gap:10px}
.inline-logo svg{width:28px;height:28px}

.section-label{font-size:10px;letter-spacing:.2em;text-transform:uppercase;color:#3b82f6;opacity:.5;margin-bottom:-20px}

/* Lockup row */
.lockup{display:flex;align-items:center;gap:16px}
.lockup svg{width:64px;height:64px;filter:drop-shadow(0 0 16px rgba(59,130,246,0.12))}
.lockup-text{display:flex;flex-direction:column;gap:2px}
</style>
</head>
<body>

<div class="showcase">

  <!-- ═══ HERO: Large Logo + Wordmark ═══ -->
  <div class="logo-large">
    <svg viewBox="0 0 32 32" fill="none">
      <path d="M16 2L28 9v14l-12 7L4 23V9l12-7z" stroke="#3b82f6" stroke-width="1.2" fill="none" opacity=".35"/>
      <path d="M16 6l8 4.6v9.2L16 24.4 8 19.8v-9.2L16 6z" stroke="#3b82f6" stroke-width="1.4" fill="rgba(59,130,246,.06)"/>
      <circle cx="16" cy="10.6" r="1.6" fill="#5a9f8f"/>
      <circle cx="21.2" cy="13.6" r="1.3" fill="#3b82f6" opacity=".7"/>
      <circle cx="21.2" cy="18.4" r="1.3" fill="#3b82f6" opacity=".5"/>
      <circle cx="16" cy="21.4" r="1.3" fill="#3b82f6" opacity=".4"/>
      <circle cx="10.8" cy="18.4" r="1.3" fill="#3b82f6" opacity=".5"/>
      <circle cx="10.8" cy="13.6" r="1.3" fill="#3b82f6" opacity=".7"/>
      <line x1="16" y1="10.6" x2="21.2" y2="13.6" stroke="#3b82f6" stroke-width=".7" opacity=".4"/>
      <line x1="16" y1="10.6" x2="10.8" y2="13.6" stroke="#3b82f6" stroke-width=".7" opacity=".4"/>
      <line x1="21.2" y1="13.6" x2="21.2" y2="18.4" stroke="#3b82f6" stroke-width=".7" opacity=".3"/>
      <line x1="10.8" y1="13.6" x2="10.8" y2="18.4" stroke="#3b82f6" stroke-width=".7" opacity=".3"/>
      <line x1="21.2" y1="18.4" x2="16" y2="21.4" stroke="#3b82f6" stroke-width=".7" opacity=".3"/>
      <line x1="10.8" y1="18.4" x2="16" y2="21.4" stroke="#3b82f6" stroke-width=".7" opacity=".3"/>
    </svg>
    <span class="wm wm-xl">GIMO</span>
    <div class="logo-sub">mesh</div>
  </div>

  <div class="divider"></div>

  <!-- ═══ Horizontal lockup ═══ -->
  <div class="section-label">Horizontal lockup</div>
  <div class="lockup">
    <svg viewBox="0 0 32 32" fill="none">
      <path d="M16 2L28 9v14l-12 7L4 23V9l12-7z" stroke="#3b82f6" stroke-width="1.2" fill="none" opacity=".35"/>
      <path d="M16 6l8 4.6v9.2L16 24.4 8 19.8v-9.2L16 6z" stroke="#3b82f6" stroke-width="1.4" fill="rgba(59,130,246,.06)"/>
      <circle cx="16" cy="10.6" r="1.6" fill="#5a9f8f"/>
      <circle cx="21.2" cy="13.6" r="1.3" fill="#3b82f6" opacity=".7"/>
      <circle cx="21.2" cy="18.4" r="1.3" fill="#3b82f6" opacity=".5"/>
      <circle cx="16" cy="21.4" r="1.3" fill="#3b82f6" opacity=".4"/>
      <circle cx="10.8" cy="18.4" r="1.3" fill="#3b82f6" opacity=".5"/>
      <circle cx="10.8" cy="13.6" r="1.3" fill="#3b82f6" opacity=".7"/>
      <line x1="16" y1="10.6" x2="21.2" y2="13.6" stroke="#3b82f6" stroke-width=".7" opacity=".4"/>
      <line x1="16" y1="10.6" x2="10.8" y2="13.6" stroke="#3b82f6" stroke-width=".7" opacity=".4"/>
      <line x1="21.2" y1="13.6" x2="21.2" y2="18.4" stroke="#3b82f6" stroke-width=".7" opacity=".3"/>
      <line x1="10.8" y1="13.6" x2="10.8" y2="18.4" stroke="#3b82f6" stroke-width=".7" opacity=".3"/>
      <line x1="21.2" y1="18.4" x2="16" y2="21.4" stroke="#3b82f6" stroke-width=".7" opacity=".3"/>
      <line x1="10.8" y1="18.4" x2="16" y2="21.4" stroke="#3b82f6" stroke-width=".7" opacity=".3"/>
    </svg>
    <div class="lockup-text">
      <span class="wm wm-lg">GIMO</span>
      <div class="logo-sub-sm" style="margin-top:0">mesh</div>
    </div>
  </div>

  <div class="divider"></div>

  <!-- ═══ Scale variants ═══ -->
  <div class="section-label">Scale variants</div>
  <div class="variants">

    <div class="variant">
      <span class="wm wm-md">GIMO</span>
      <span class="variant-label">Medium — Splash screen</span>
    </div>

    <div class="variant">
      <span class="wm wm-sm">GIMO</span>
      <span class="variant-label">Small — Settings</span>
    </div>

    <div class="variant">
      <span class="wm wm-xs">GIMO</span>
      <span class="variant-label">Tiny — App header</span>
    </div>

  </div>

  <div class="divider"></div>

  <!-- ═══ Inline: icon + wordmark as it appears in the app ═══ -->
  <div class="section-label">App header lockup</div>
  <div class="variant">
    <div class="inline-logo">
      <svg width="28" height="28" viewBox="0 0 32 32" fill="none">
        <path d="M16 2L28 9v14l-12 7L4 23V9l12-7z" stroke="#3b82f6" stroke-width="1.2" fill="none" opacity=".35"/>
        <path d="M16 6l8 4.6v9.2L16 24.4 8 19.8v-9.2L16 6z" stroke="#3b82f6" stroke-width="1.4" fill="rgba(59,130,246,.06)"/>
        <circle cx="16" cy="10.6" r="1.6" fill="#5a9f8f"/>
        <circle cx="21.2" cy="13.6" r="1.3" fill="#3b82f6" opacity=".7"/>
        <circle cx="21.2" cy="18.4" r="1.3" fill="#3b82f6" opacity=".5"/>
        <circle cx="16" cy="21.4" r="1.3" fill="#3b82f6" opacity=".4"/>
        <circle cx="10.8" cy="18.4" r="1.3" fill="#3b82f6" opacity=".5"/>
        <circle cx="10.8" cy="13.6" r="1.3" fill="#3b82f6" opacity=".7"/>
        <line x1="16" y1="10.6" x2="21.2" y2="13.6" stroke="#3b82f6" stroke-width=".7" opacity=".4"/>
        <line x1="16" y1="10.6" x2="10.8" y2="13.6" stroke="#3b82f6" stroke-width=".7" opacity=".4"/>
        <line x1="21.2" y1="13.6" x2="21.2" y2="18.4" stroke="#3b82f6" stroke-width=".7" opacity=".3"/>
        <line x1="10.8" y1="13.6" x2="10.8" y2="18.4" stroke="#3b82f6" stroke-width=".7" opacity=".3"/>
        <line x1="21.2" y1="18.4" x2="16" y2="21.4" stroke="#3b82f6" stroke-width=".7" opacity=".3"/>
        <line x1="10.8" y1="18.4" x2="16" y2="21.4" stroke="#3b82f6" stroke-width=".7" opacity=".3"/>
      </svg>
      <div>
        <span class="wm wm-xs">GIMO</span>
        <div style="font:500 7px/1 'JetBrains Mono',monospace;letter-spacing:.14em;text-transform:uppercase;color:#5a6a7c;margin-top:2px">mesh</div>
      </div>
    </div>
    <span class="variant-label">Inline — as seen in app</span>
  </div>

</div>

</body>
</html>
